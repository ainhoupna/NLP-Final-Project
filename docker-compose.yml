---

services:
  # ── Custom services ──────────────────────────────────────────────
  scraper:
    build: ./scraper
    env_file: .env
    depends_on:
      - mongo
    volumes:
      - ./models:/models
    restart: always
    network_mode: "host"

  flask_app:
    build: ./flask_app
    env_file: .env
    depends_on:
      - mongo
      - llm
    volumes:
      - ./models:/models
      - ./flask_app:/app
    restart: always
    network_mode: "host"

  # ── Third-party services ─────────────────────────────────────────
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    gpus: all
    privileged: true
    volumes:
      - ./models:/models
    env_file: .env
    command: >
      -m /models/${LLM_MODEL_FILENAME} -c 16384 -ngl 99 --host 0.0.0.0 --port 8080
    restart: "no"
    network_mode: "host"
    deploy:
      resources:
        limits:
          memory: 8g

  mongo:
    image: mongo:latest
    user: "1001:1001"
    ports:
      - "27017:27017"
    volumes:
      - /home/alumno/Desktop/datos/mongodb_data:/data/db
    network_mode: "host"

  mongo-express:
    image: mongo-express:latest
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://127.0.0.1:27017/?directConnection=true
    network_mode: "host"
    restart: always

  llm_qwen:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    gpus: all
    privileged: true
    volumes:
      - ./models:/models
    command: >
      -m /models/Qwen3.5-35B-A3B-Uncensored-HauhauCS-Aggressive-Q6_K.gguf 
      -c 8192 -ngl 99 --host 0.0.0.0 --port 30000
    restart: "no"
    network_mode: "host"

volumes:
  chroma_data:
