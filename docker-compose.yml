---

services:
  # ── Custom services ──────────────────────────────────────────────
  scraper:
    build: ./scraper
    env_file: .env
    depends_on:
      - mongo
    volumes:
      - ./models:/models
    restart: always
    network_mode: "host"

  flask_app:
    build: ./flask_app
    env_file: .env
    depends_on:
      - mongo
      - llm
    volumes:
      - ./models:/models
    restart: always
    network_mode: "host"

  # ── Third-party services ─────────────────────────────────────────
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    gpus: all
    privileged: true
    volumes:
      - ./models:/models
    env_file: .env
    command: >
      -m /models/${LLM_MODEL_FILENAME} -c 4096 -ngl 99 --host 0.0.0.0 --port 8080
    restart: "no"
    network_mode: "host"
    deploy:
      resources:
        limits:
          memory: 8g

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    network_mode: "host"

  mongo-express:
    image: mongo-express:latest
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://127.0.0.1:27017/?directConnection=true
    network_mode: "host"
    restart: always

volumes:
  mongodb_data:
  chroma_data:


